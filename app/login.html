<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>KINETIC | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../public/CSS/style.css" />
</head>
<body class="bg-surface text-white">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card bg-surface-container-high text-white p-5 rounded-4 shadow-lg border border-outline-variant" style="width: 420px;">
        <div class="text-center mb-4">
            <a href="../index.html" class="fs-2 font-black text-primary-container font-headline tracking-tight text-decoration-none">KINETIC</a>
            <h2 class="h4 font-bold mt-3 text-white fst-italic">Welcome Back</h2>
            <p class="text-xs text-on-surface-variant">Log in to continue your progress</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="text-xxs font-bold text-uppercase tracking-widest text-on-surface-variant mb-2 d-block">Email</label>
                <input type="email" class="form-control bg-surface-container border-0 text-white py-2 shadow-none font-body text-sm" placeholder="elite@kinetic.com">
            </div>

            <div class="mb-4">
                <label class="text-xxs font-bold text-uppercase tracking-widest text-on-surface-variant mb-2 d-block">Password</label>
                <input type="password" class="form-control bg-surface-container border-0 text-white py-2 shadow-none font-body text-sm" placeholder="••••••••">
            </div>  

            <a href="Dashboard.html" class="btn w-100 font-bold tracking-widest py-3 mb-4" style="background-color: var(--primary-container); color: var(--on-primary-container);">
                LOGIN TO DASHBOARD
            </a>

            <p class="text-center text-sm text-on-surface-variant mb-0">
                No account? <a href="signup.html" class="text-primary-container font-bold text-decoration-none hover-text-white" style="transition: 0.2s;">Sign Up</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>
